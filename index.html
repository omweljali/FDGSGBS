<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Story - Part I</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#2b0d18,#5b1730,#12040b);
font-family:Georgia,serif;
overflow:hidden;
}
.book{
    width:min(90vw,1000px);
    aspect-ratio:4/3;
    position:relative;
    perspective:2000px;
}
.page{
position:absolute;
width:100%;
height:100%;
background:white;
border-radius:8px;
box-shadow:0 8px 25px rgba(0,0,0,.4);
transform-origin:left;
transition:transform .8s;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}
.page img{
    width:96%;
    height:96%;
    object-fit:contain;
    background:#f5f5f5;
    border:8px solid white;
    border-radius:8px;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}
.cover,.last{
background:linear-gradient(135deg,#b71c1c,#6a0000);
color:#efe7d6;
text-align:center;
padding:30px;
box-sizing:border-box;
}
.flipped{
transform:rotateY(-180deg);
}
.controls{
position:fixed;
bottom:20px;
display:flex;
gap:15px;
}
button{
padding:10px 18px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}
.hearts{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:#ff4d6d;
    font-size:20px;
    opacity:0.6;
    animation:float linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(0) scale(0.5) rotate(0deg);
        opacity:0;
    }
    10%{
        opacity:.7;
    }
    100%{
        transform:translateY(-120vh) scale(1.4) rotate(360deg);
        opacity:0;
    }
}

.book{
    z-index:2;
}

.controls{
    z-index:3;
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="book" id="book"></div>

<div class="controls">
<button onclick="prev()">◀ Prev</button>
<button onclick="next()">Next ▶</button>
</div>

<script>
const book=document.getElementById("book");
const pages=[];

function addPage(content,cls=""){
 let p=document.createElement("div");
 p.className="page "+cls;
 p.innerHTML=content;
 p.style.zIndex=100-pages.length;
 book.appendChild(p);
 pages.push(p);
}

addPage(`
<div class="cover">
<h1>📖 Our Story</h1>
<h2>Part I ❤️</h2>
<p>Every page holds a memory...</p>
</div>`,"cover");

for(let i=1;i<=9;i++){
addPage(`<img src="photos/${i}.jpeg" onerror="this.src='photos/${i}.jpg'">`);
}

addPage(`
<div class="last">
<h1>Stay Tuned...</h1>
<h2>Our Story - Part II ❤️</h2>
<p>The best chapters are yet to come.</p>
</div>`,"last");

let current=0;

function update(){
pages.forEach((p,i)=>{
p.classList.toggle("flipped",i<current);
});
}

function next(){
if(current<pages.length-1){
current++;
update();
}
}

function prev(){
if(current>0){
current--;
update();
}
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowRight") next();
if(e.key==="ArrowLeft") prev();
});

// Floating hearts
const hearts = document.getElementById("hearts");

for(let i=0;i<45;i++){

    const heart=document.createElement("div");

    heart.className="heart";

    heart.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];

    heart.style.left=Math.random()*100+"vw";

    heart.style.animationDuration=(8+Math.random()*10)+"s";

    heart.style.animationDelay=Math.random()*10+"s";

    heart.style.fontSize=(15+Math.random()*25)+"px";

    hearts.appendChild(heart);

}

update();
</script>

</body>
</html>
